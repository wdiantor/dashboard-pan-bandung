<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pemenangan PAN Kab. Bandung</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/svg+xml" href="https://upload.wikimedia.org/wikipedia/id/4/47/Partai_Amanat_Nasional_Logo.svg">    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --pan-blue: #0054a6;
            --pan-orange: #f97316;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #0f172a, #1e293b);
            color: #f1f5f9;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #map { 
            height: 550px; 
            width: 100%; 
            border-radius: 1.5rem; 
            z-index: 1;
            /* Memastikan peta tidak abu-abu saat load */
            background: #0f172a;
        }

        select option {
            background: #1e293b;
            color: white;
        }

        .leaflet-popup-content-wrapper {
            background: #1e293b;
            color: white;
            border-radius: 12px;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="mb-10 flex flex-col md:flex-row items-center justify-between gap-6">
            <div class="flex items-center gap-4">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b2/Lambang_Kabupaten_Bandung.png" class="h-12" alt="Logo Kab Bandung">
                <div class="h-10 w-[1px] bg-white/20 mx-2"></div>
                <img src="https://upload.wikimedia.org/wikipedia/id/4/47/Partai_Amanat_Nasional_Logo.svg" class="h-12" alt="Logo PAN">
            </div>

            <div class="text-center md:text-right">
                <h1 class="text-3xl font-extrabold text-blue-400 tracking-tight uppercase">DPRT & Kader Monitoring</h1>
                <p class="text-slate-300 font-medium tracking-wide">DPD PARTAI AMANAT NASIONAL KAB. BANDUNG</p>
            </div>
        </header>

       <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
    <div class="glass-card p-6 rounded-2xl border-t-4 border-t-blue-500">
        <label class="block text-[10px] text-slate-400 mb-2 font-black uppercase tracking-widest">Filter Dapil</label>
        <select id="filterDapil" class="w-full bg-slate-900/50 border border-slate-700 text-white p-2 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-bold">
            <option value="ALL">SEMUA DAPIL</option>
        </select>
    </div>
    <div class="glass-card p-6 rounded-2xl border-t-4 border-t-orange-500">
        <label class="block text-[10px] text-slate-400 mb-2 font-black uppercase tracking-widest">Filter Kecamatan</label>
        <select id="filterKecamatan" class="w-full bg-slate-900/50 border border-slate-700 text-white p-2 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-bold">
            <option value="ALL">SEMUA KECAMATAN</option>
        </select>
    </div>
    <div class="glass-card p-6 rounded-2xl flex items-center justify-center">
        <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-bold transition-all flex items-center gap-2">
            <i class="fas fa-print"></i> CETAK LAPORAN
        </button>
    </div>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
    <div class="glass-card p-6 rounded-3xl">
        <h3 class="text-emerald-400 font-bold mb-4 uppercase text-sm tracking-widest"><i class="fas fa-trophy"></i> Top 5 Desa (Kader Terbanyak)</h3>
        <div id="top-leaderboard" class="space-y-3"></div>
    </div>
    <div class="glass-card p-6 rounded-3xl">
        <h3 class="text-rose-400 font-bold mb-4 uppercase text-sm tracking-widest"><i class="fas fa-exclamation-triangle"></i> Bottom 5 Desa (Perlu Evaluasi)</h3>
        <div id="bottom-leaderboard" class="space-y-3"></div>
    </div>
</div>
            <div class="glass-card p-6 rounded-2xl flex items-center gap-5">
                <div class="bg-blue-600/20 p-4 rounded-xl text-blue-400 text-2xl shadow-lg shadow-blue-500/10">
                    <i class="fas fa-landmark"></i>
                </div>
                <div>
                    <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest">Jumlah DPRT Aktif</p>
                    <h2 id="stat-dprt" class="text-4xl font-black text-white">0</h2>
                </div>
            </div>

            <div class="glass-card p-6 rounded-2xl flex items-center gap-5">
                <div class="bg-orange-500/20 p-4 rounded-xl text-orange-400 text-2xl shadow-lg shadow-orange-500/10">
                    <i class="fas fa-users"></i>
                </div>
                <div>
                    <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest">Total Kader</p>
                    <h2 id="stat-kader" class="text-4xl font-black text-white">0</h2>
                </div>
            </div>

            <div class="glass-card p-6 rounded-2xl flex items-center gap-5 border-r-4 border-r-emerald-500">
                <div class="bg-emerald-500/20 p-4 rounded-xl text-emerald-400 text-2xl">
                    <i class="fas fa-check-double"></i>
                </div>
                <div>
                    <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest">Status Data</p>
                    <h2 class="text-xl font-black text-emerald-400 uppercase tracking-tighter">Terverifikasi</h2>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-5 gap-8">
            <div class="lg:col-span-2 glass-card p-6 rounded-3xl overflow-hidden">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="font-bold text-lg text-white flex items-center gap-2">
                        <i class="fas fa-chart-line text-blue-400"></i> Statistik Kekuatan
                    </h3>
                    <span id="chart-label" class="text-[10px] bg-blue-500/20 text-blue-400 px-2 py-1 rounded-md font-bold uppercase tracking-widest">Per Desa</span>
                </div>
                <div class="h-[500px] relative">
                    <canvas id="panChart"></canvas>
                </div>
            </div>

            <div class="lg:col-span-3 glass-card p-6 rounded-3xl">
                <h3 class="font-bold text-lg text-white mb-6 flex items-center gap-2">
                    <i class="fas fa-map-marked-alt text-blue-400"></i> Pemetaan Teritorial
                </h3>
                <div id="map"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
