<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pemenangan PAN Kab. Bandung</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/svg+xml" href="https://upload.wikimedia.org/wikipedia/id/4/47/Partai_Amanat_Nasional_Logo.svg">    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --pan-blue-dark: #003366;
            --pan-blue-light: #0054a6;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #004182, #0f172a 70%);
            color: #f1f5f9;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        #map { 
            height: 550px; 
            width: 100%; 
            border-radius: 1.5rem; 
            z-index: 1;
        }

        /* Dark Mode Map Filter */
        .leaflet-tile { filter: brightness(0.6) invert(1) contrast(3) hue-rotate(200deg) saturate(0.3); }

        .logo-container img {
            height: 60px;
            object-fit: contain;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="mb-10 flex flex-col md:flex-row items-center justify-between gap-6">
            <div class="flex items-center gap-4 logo-container">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b2/Lambang_Kabupaten_Bandung.png" alt="Logo Kab Bandung">
                <img src="https://upload.wikimedia.org/wikipedia/id/thumb/e/e0/Logo_DPRD_Kabupaten_Bandung.png/200px-Logo_DPRD_Kabupaten_Bandung.png" alt="Logo DPRD">
                <div class="h-12 w-[1px] bg-white/20 mx-2"></div>
                <img src="https://upload.wikimedia.org/wikipedia/id/4/47/Partai_Amanat_Nasional_Logo.svg" alt="Logo PAN">
            </div>

            <div class="text-center md:text-right">
                <h1 class="text-3xl font-extrabold text-blue-400 tracking-tight uppercase">DPRT & Kader Monitoring</h1>
                <p class="text-slate-300 font-medium tracking-wide">DPD PARTAI AMANAT NASIONAL KAB. BANDUNG</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="glass-card p-6 rounded-2xl border-t-4 border-t-blue-500">
                <label class="block text-[10px] text-slate-400 mb-3 font-black uppercase tracking-[0.2em]">Pilih Wilayah</label>
                <select id="filterKecamatan" class="w-full bg-slate-900/50 border border-slate-700 text-white p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer font-bold">
                    <option value="ALL">KABUPATEN BANDUNG (SEMUA)</option>
                </select>
            </div>

            <div class="glass-card p-6 rounded-2xl flex items-center gap-5">
                <div class="bg-blue-600/20 p-4 rounded-xl text-blue-400 text-2xl"><i class="fas fa-sitemap"></i></div>
                <div>
                    <p class="text-[10px] text-slate-400 font-black uppercase tracking-[0.2em]">DPRT Aktif</p>
                    <h2 id="stat-dprt" class="text-4xl font-black text-white">31</h2>
                </div>
            </div>

            <div class="glass-card p-6 rounded-2xl flex items-center gap-5">
                <div class="bg-orange-500/20 p-4 rounded-xl text-orange-400 text-2xl"><i class="fas fa-users"></i></div>
                <div>
                    <p class="text-[10px] text-slate-400 font-black uppercase tracking-[0.2em]">Total Kader</p>
                    <h2 id="stat-kader" class="text-4xl font-black text-white">1.240</h2>
                </div>
            </div>

            <div class="glass-card p-6 rounded-2xl flex items-center gap-5 border-r-4 border-r-emerald-500">
                <div class="bg-emerald-500/20 p-4 rounded-xl text-emerald-400 text-2xl"><i class="fas fa-percentage"></i></div>
                <div>
                    <p class="text-[10px] text-slate-400 font-black uppercase tracking-[0.2em]">Kesiapan</p>
                    <h2 class="text-4xl font-black text-emerald-400">100%</h2>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-5 gap-8">
            <div class="lg:col-span-2 glass-card p-6 rounded-3xl">
                <h3 class="font-bold text-lg text-white mb-6">Statistik Per Wilayah</h3>
                <div class="h-[600px]">
                    <canvas id="panChart"></canvas>
                </div>
            </div>

            <div class="lg:col-span-3 glass-card p-6 rounded-3xl">
                <h3 class="font-bold text-lg text-white mb-6">Sebaran Geografis</h3>
                <div id="map"></div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script>
        // Konfigurasi Peta
        var map = L.map('map').setView([-7.02, 107.55], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        var geojsonLayer;
        var labelsKecamatan = [];
        var dataDummyKader = [];

        // Load Data Wilayah
        fetch('kab-bandung.json')
            .then(res => res.json())
            .then(data => {
                geojsonLayer = L.geoJSON(data, {
                    style: {
                        color: "#3b82f6",
                        weight: 1.5,
                        fillColor: "#1d4ed8",
                        fillOpacity: 0.3
                    },
                    onEachFeature: function (feature, layer) {
                        const kecName = feature.properties.NAME_3;
                        if (kecName) {
                            // Isi dropdown filter
                            let option = document.createElement("option");
                            option.value = kecName;
                            option.text = kecName.toUpperCase();
                            document.getElementById("filterKecamatan").appendChild(option);
                            
                            // Ambil nama untuk chart
                            labelsKecamatan.push(kecName);
                            dataDummyKader.push(Math.floor(Math.random() * 200) + 50); // Contoh data

                            layer.bindPopup("<strong>Kecamatan: </strong>" + kecName);
                        }
                    }
                }).addTo(map);
                
                initChart();
            });

        // Inisialisasi Chart.js
        function initChart() {
            const ctx = document.getElementById('panChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labelsKecamatan,
                    datasets: [{
                        label: 'Jumlah Kader',
                        data: dataDummyKader,
                        backgroundColor: '#3b82f6',
                        borderRadius: 5
                    }]
                },
                options: {
                    indexAxis: 'y',
                    maintainAspectRatio: false,
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#94a3b8' } },
                        y: { grid: { display: false }, ticks: { color: '#f1f5f9', font: { size: 10 } } }
                    }
                }
            });
        }

        // Fungsi Filter (Logic Sederhana)
        document.getElementById("filterKecamatan").addEventListener("change", function(e) {
            const val = e.target.value;
            geojsonLayer.eachLayer(function(layer) {
                if (val === "ALL" || layer.feature.properties.NAME_3 === val) {
                    layer.setStyle({ fillOpacity: 0.7, color: '#60a5fa' });
                    if (val !== "ALL") map.fitBounds(layer.getBounds());
                } else {
                    layer.setStyle({ fillOpacity: 0.1, color: '#334155' });
                }
            });
            if (val === "ALL") map.setView([-7.02, 107.55], 10);
        });
    </script>
</body>
</html>
