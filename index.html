<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard PAN Kabupaten Bandung</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <header class="mb-10 text-center md:text-left">
            <h1 class="text-3xl font-extrabold text-blue-500">📊 DASHBOARD PAN KAB. BANDUNG</h1>
            <p class="text-slate-400">Data Real-time Desa & Kecamatan</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="md:col-span-2">
                <label class="block text-sm text-slate-400 mb-2">Filter Kecamatan:</label>
                <select id="filterKecamatan" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" onchange="applyFilter()">
                    <option value="ALL">Semua Kecamatan</option>
                </select>
            </div>
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                <span class="text-slate-400 text-xs block uppercase font-bold">Total DPRT Aktif</span>
                <span id="stat-dprt" class="text-2xl font-bold text-blue-400">0</span>
            </div>
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                <span class="text-slate-400 text-xs block uppercase font-bold">Total Kader</span>
                <span id="stat-kader" class="text-2xl font-bold text-orange-400">0</span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 shadow-2xl">
                <h2 class="text-lg font-semibold mb-4">Sebaran Data</h2>
                <div class="h-[400px]">
                    <canvas id="panChart"></canvas>
                </div>
            </div>
            <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 shadow-2xl flex flex-col items-center justify-center">
                <h2 class="text-lg font-semibold mb-4 self-start">Peta Wilayah</h2>
                <div id="map-placeholder" class="text-slate-500 text-center">
                    <p>Integrasi Peta GeoJSON Kabupaten Bandung</p>
                    <p class="text-sm italic">(Memerlukan file .json peta Bandung)</p>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
