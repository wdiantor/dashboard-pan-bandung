<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pemenangan PAN Kab. Bandung</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/svg+xml" href="https://upload.wikimedia.org/wikipedia/id/4/47/Partai_Amanat_Nasional_Logo.svg">    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --pan-blue-dark: #003366;
            --pan-blue-light: #0054a6;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #0f172a, #1e293b);
            color: #f1f5f9;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        #map { 
            height: 550px; 
            width: 100%; 
            border-radius: 1.5rem; 
            z-index: 1;
        }

        /* Customize Leaflet Popup */
        .leaflet-popup-content-wrapper {
            background: #1e293b;
            color: white;
            border-radius: 12px;
        }
        .leaflet-popup-tip { background: #1e293b; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="mb-10 flex flex-col md:flex-row items-center justify-between gap-6">
            <div class="flex items-center gap-4">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b2/Lambang_Kabupaten_Bandung.png" class="h-12" alt="Logo Kab Bandung">
                <div class="h-10 w-[1px] bg-white/20 mx-2"></div>
                <img src="https://upload.wikimedia.org/wikipedia/id/4/47/Partai_Amanat_Nasional_Logo.svg" class="h-12" alt="Logo PAN">
            </div>

            <div class="text-center md:text-right">
                <h1 class="text-3xl font-extrabold text-blue-400 tracking-tight uppercase">DPRT & Kader Monitoring</h1>
                <p class="text-slate-300 font-medium">DPD PARTAI AMANAT NASIONAL KAB. BANDUNG</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="glass-card p-6 rounded-2xl border-t-4 border-t-blue-500">
                <label class="block text-[10px] text-slate-400 mb-3 font-black uppercase tracking-widest">Filter Wilayah</label>
                <select id="filterKecamatan" class="w-full bg-slate-900 border border-slate-700 text-white p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-bold">
                    <option value="ALL">MEMUAT DATA...</option>
                </select>
            </div>

            <div class="glass-card p-6 rounded-2xl flex items-center gap-5">
                <div class="bg-blue-600/20 p-4 rounded-xl text-blue-400 text-2xl"><i class="fas fa-landmark"></i></div>
                <div>
                    <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest">Total DPRT Aktif</p>
                    <h2 id="stat-dprt" class="text-4xl font-black text-white">0</h2>
                </div>
            </div>

            <div class="glass-card p-6 rounded-2xl flex items-center gap-5">
                <div class="bg-orange-500/20 p-4 rounded-xl text-orange-400 text-2xl"><i class="fas fa-users"></i></div>
                <div>
                    <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest">Total Kader</p>
                    <h2 id="stat-kader" class="text-4xl font-black text-white">0</h2>
                </div>
            </div>

            <div class="glass-card p-6 rounded-2xl flex items-center gap-5 border-r-4 border-r-emerald-500">
                <div class="bg-emerald-500/20 p-4 rounded-xl text-emerald-400 text-2xl"><i class="fas fa-check-circle"></i></div>
                <div>
                    <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest">Status Data</p>
                    <h2 class="text-2xl font-black text-emerald-400 uppercase">Live Sheets</h2>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-5 gap-8">
            <div class="lg:col-span-2 glass-card p-6 rounded-3xl">
                <h3 class="font-bold text-lg text-white mb-6 flex items-center gap-2">
                    <i class="fas fa-chart-bar text-blue-400"></i> Distribusi Kekuatan
                </h3>
                <div class="h-[500px] relative">
                    <canvas id="panChart"></canvas>
                </div>
            </div>

            <div class="lg:col-span-3 glass-card p-6 rounded-3xl">
                <h3 class="font-bold text-lg text-white mb-6 flex items-center gap-2">
                    <i class="fas fa-map-marked-alt text-blue-400"></i> Pemetaan Teritorial
                </h3>
                <div id="map"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
